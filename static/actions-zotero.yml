    1764596050932-WvvdkPIt:
      event: 0
      operation: 4
      data: >
        /**
         * Pandoc Export Script for Zotero Better Notes
         * 
         * 功能：将 Zotero 笔记导出为 Word (docx) 文档，支持图片和引用链接
         * 
         * 作者：Stream-L
         * 日期：2025-12-01
         * 版本：2.0
          */

        //
        ============================================================================

        //  用户配置区域 (USER CONFIGURATION)

        // 
        ============================================================================

        const USER_CONFIG = {
            // Pandoc 可执行文件搜索路径列表
            // 脚本会依次检查这些路径，直到找到可用的 Pandoc
            pandocPaths: [
                "C:\\Program Files\\Pandoc\\pandoc.exe",
                "C:\\Program Files (x86)\\Pandoc\\pandoc.exe",
                "pandoc", // 尝试系统 PATH
            ],

            // Word 模板路径 (.docx) 需要自行修改
            // 模板中的样式（字体、段落格式等）将被应用到输出文档
            templatePath: "C:\\Users\\STREAM\\Documents\\template\\pandoc\\不编号templates_报告自用.docx",

            // 导出选项
            options: {
                // 链接样式: "hyperlink" 或 "text"
                // "hyperlink" - 生成可点击的超链接
                // "text" - 仅保留文本，去除链接
                linkStyle: "hyperlink",
                
                // 是否处理图片（解析 Better Notes 的图片格式）
                processImages: true,
                
                // 调试模式（打印更多日志）
                debug: true
            }
        };


        //
        ============================================================================

        // 脚本主体 - 请勿修改以下代码

        //
        ============================================================================


        // 阻止脚本多次执行

        if (typeof item !== "undefined" && item) return;


        const Zotero = require("Zotero");

        const window = require("window");

        const { Services } =
        ChromeUtils.import("resource://gre/modules/Services.jsm");


        // 获取选中的条目

        let selectedItems = [];

        if (typeof items !== "undefined" && items.length > 0) {
            selectedItems = items;
        } else if (typeof item !== "undefined") {
            selectedItems = [item];
        } else {
            window.alert("请先选择要处理的条目");
            return;
        }


        const CONFIG = {
            templatePath: USER_CONFIG.templatePath,
            pandocPath: null,
            ...USER_CONFIG.options
        };


        //
        ============================================================================

        // 核心函数

        //
        ============================================================================


        /**
         * 查找 Pandoc 可执行文件
         */
        async function findPandoc() {
            const localAppData = Services.env.get("LOCALAPPDATA");
            const searchPaths = [
                ...USER_CONFIG.pandocPaths,
                `${localAppData}\\Pandoc\\pandoc.exe`
            ];

            for (const path of searchPaths) {
                if (!path) continue;
                
                if (path === "pandoc") continue; // 跳过，最后尝试
                
                if (await IOUtils.exists(path)) {
                    Zotero.debug(`[Pandoc Export] 找到 Pandoc: ${path}`);
                    return path;
                }
            }

            if (USER_CONFIG.pandocPaths.includes("pandoc")) {
                return "pandoc";
            }

            throw new Error(
                "无法找到 Pandoc 可执行文件。\n\n" +
                "请使用以下方法之一安装：\n" +
                "1. Winget: winget install Pandoc.Pandoc\n" +
                "2. Chocolatey: choco install pandoc\n" +
                "3. 官网下载: https://pandoc.org/installing.html\n\n" +
                "安装后请重新运行此脚本。"
            );
        }


        /**
         * 选择保存文件路径
         */
        function pickSaveFile(defaultName) {
            return new Promise((resolve) => {
                const nsIFilePicker = Components.interfaces.nsIFilePicker;
                const fp = Components.classes["@mozilla.org/filepicker;1"]
                    .createInstance(nsIFilePicker);
                
                fp.init(window, "保存 Word 文档", nsIFilePicker.modeSave);
                fp.appendFilter("Word 文档 (*.docx)", "*.docx");
                fp.defaultString = defaultName;
                fp.defaultExtension = "docx";
                
                fp.open((result) => {
                    if (result === nsIFilePicker.returnOK || result === nsIFilePicker.returnReplace) {
                        let path = fp.file.path;
                        if (!path.toLowerCase().endsWith(".docx")) {
                            path += ".docx";
                        }
                        resolve(path);
                    } else {
                        resolve(null);
                    }
                });
            });
        }


        /**
         * 选择输出目录
         */
        function pickDirectory() {
            return new Promise((resolve) => {
                const nsIFilePicker = Components.interfaces.nsIFilePicker;
                const fp = Components.classes["@mozilla.org/filepicker;1"]
                    .createInstance(nsIFilePicker);
                
                fp.init(window, "选择输出目录", nsIFilePicker.modeGetFolder);
                
                fp.open((result) => {
                    if (result === nsIFilePicker.returnOK) {
                        resolve(fp.file.path);
                    } else {
                        resolve(null);
                    }
                });
            });
        }


        /**
         * 获取笔记标题
         */
        function getNoteTitle(noteItem) {
            const note = noteItem.getNote();
            const parser = new DOMParser();
            const doc = parser.parseFromString(note, "text/html");
            
            const h1 = doc.querySelector("h1, h2, h3");
            if (h1 && h1.textContent.trim()) {
                return sanitizeFilename(h1.textContent.trim());
            }
            
            const text = doc.body.textContent.trim();
            if (text) {
                return sanitizeFilename(text.substring(0, 50));
            }
            
            return "untitled_note";
        }


        /**
         * 清理文件名
         */
        function sanitizeFilename(name) {
            return name
                .replace(/[<>:"/\\|?*]/g, "_")
                .replace(/\s+/g, " ")
                .trim()
                .substring(0, 100);
        }


        /**
         * 笔记转 Markdown
         */
        async function noteToMarkdown(noteItem) {
            const api = Zotero.BetterNotes?.api;
            if (api && api.convert && api.convert.note2md) {
                let markdown = await api.convert.note2md(noteItem, Zotero.getTempDirectory().path, {
                    keepNoteLink: true,
                    withYAMLHeader: false,
                });
                
                markdown = await processMarkdownContent(markdown);
                return markdown;
            }
            
            return await processNoteHtml(noteItem);
        }


        /**
         * 处理 Markdown 内容（图片和链接）
         */
        async function processMarkdownContent(markdown) {
            // 1. 递归移除 span 标签
            let prev = "";
            while (markdown !== prev) {
                prev = markdown;
                markdown = markdown.replace(/<span\s+[^>]*>([\s\S]*?)<\/span>/gi, "$1");
            }

            // 2. 处理链接
            markdown = markdown.replace(/<a\s+(?:[^>]*?\s+)?href=["'"](zotero:\/\/[^"'"]+)["'"][^>]*>([\s\S]*?)<\/a>/gi, (match, url, text) => {
                if (CONFIG.linkStyle === "text") {
                    return text;
                }
                return `[${text}](${url})`;
            });

            // 3. 处理图片
            const replacements = [];
            const storagePath = Zotero.getStorageDirectory().path;

            // Markdown 图片语法
            const mdImgRegex = /!\[(.*?)\]\((attachments\/([^)]+))\)/g;
            let match;
            while ((match = mdImgRegex.exec(markdown)) !== null) {
                const fullMatch = match[0];
                const altText = match[1];
                const filename = match[3];
                
                let key = null;
                const keyMatch = altText.match(/data-attachment-key=["'"]([^"'"]+)["'"]/);
                if (keyMatch) {
                    key = keyMatch[1];
                } else {
                    key = filename.split('.')[0];
                }

                if (key) {
                    replacements.push({ fullMatch, key, alt: "image" });
                }
            }

            // HTML img 标签
            const htmlImgRegex = /<img\s+[^>]*data-attachment-key=["'"]([^"'"]+)["'"][^>]*>/gi;
            while ((match = htmlImgRegex.exec(markdown)) !== null) {
                replacements.push({
                    fullMatch: match[0],
                    key: match[1],
                    alt: "image"
                });
            }

            // 执行图片路径替换
            for (const rep of replacements) {
                let realPath = null;
                const itemDir = PathUtils.join(storagePath, rep.key);
                
                if (await IOUtils.exists(itemDir)) {
                    const children = await IOUtils.getChildren(itemDir);
                    for (const child of children) {
                        if (child.toLowerCase().match(/\.(png|jpg|jpeg|gif|bmp|webp|svg)$/)) {
                            realPath = child;
                            break;
                        }
                    }
                }

                if (realPath) {
                    realPath = realPath.replace(/\\/g, '/');
                    const newImage = `![${rep.alt}](${realPath})`;
                    markdown = markdown.replace(rep.fullMatch, newImage);
                    Zotero.debug(`[Pandoc] 图片替换: ${rep.key} -> ${realPath}`);
                } else {
                    Zotero.debug(`[Pandoc] 未找到图片: ${rep.key}`);
                }
            }

            return markdown;
        }


        /**
         * 处理笔记 HTML（回退方案）
         */
        async function processNoteHtml(noteItem) {
            const note = noteItem.getNote();
            const parser = new DOMParser();
            const doc = parser.parseFromString(note, "text/html");
            
            const images = doc.querySelectorAll('img[data-attachment-key]');
            for (const img of images) {
                const key = img.getAttribute('data-attachment-key');
                if (key) {
                    const storagePath = Zotero.getStorageDirectory().path;
                    const exts = ['.png', '.jpg', '.jpeg', '.gif', '.webp'];
                    
                    for (const ext of exts) {
                        const imagePath = PathUtils.join(storagePath, key, key + ext);
                        if (await IOUtils.exists(imagePath)) {
                            img.setAttribute('src', imagePath);
                            break;
                        }
                    }
                }
            }
            
            return simpleHtmlToMarkdown(doc.body);
        }


        /**
         * 简单的 HTML 转 Markdown
         */
        function simpleHtmlToMarkdown(element) {
            let result = "";
            
            function process(node, depth = 0) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return node.textContent;
                }
                
                if (node.nodeType !== Node.ELEMENT_NODE) {
                    return "";
                }
                
                const tag = node.tagName.toLowerCase();
                let content = "";
                
                for (const child of node.childNodes) {
                    content += process(child, depth + (tag === 'ul' || tag === 'ol' ? 1 : 0));
                }
                
                switch (tag) {
                    case "h1": return `# ${content.trim()}\n\n`;
                    case "h2": return `## ${content.trim()}\n\n`;
                    case "h3": return `### ${content.trim()}\n\n`;
                    case "p": return `${content.trim()}\n\n`;
                    case "strong":
                    case "b": return `**${content}**`;
                    case "em":
                    case "i": return `*${content}*`;
                    case "code": return `\`${content}\``;
                    case "a":
                        const href = node.getAttribute("href") || "";
                        const text = content.trim() || href;
                        if (CONFIG.linkStyle === "text") return text;
                        return `[${text}](${href})`;
                    case "li":
                        const indent = "  ".repeat(Math.max(0, depth - 1));
                        return `${indent}- ${content.trim()}\n`;
                    case "br": return "\n";
                    default: return content;
                }
            }
            
            result = process(element);
            return result.replace(/\n{3,}/g, "\n\n");
        }


        /**
         * 运行 Pandoc
         */
        async function runPandoc(inputPath, outputPath) {
            const tempDir = Zotero.getTempDirectory().path;
            const errorLogPath = PathUtils.join(tempDir, `pandoc_error_${Zotero.Utilities.randomString(6)}.log`);
            const batPath = PathUtils.join(tempDir, `pandoc_run_${Zotero.Utilities.randomString(6)}.bat`);
            
            // 构建命令
            let cmd = `"${CONFIG.pandocPath}" "${inputPath}" -o "${outputPath}" --wrap=none`;
            
            if (CONFIG.templatePath && await IOUtils.exists(CONFIG.templatePath)) {
                cmd += ` --reference-doc "${CONFIG.templatePath}"`;
            }
            
            cmd += ` 2>"${errorLogPath}"`;

            // 创建批处理文件
            const batContent = "@echo off\r\n" +
                "chcp 65001 > nul\r\n" +
                cmd + "\r\n" +
                "exit /b %errorlevel%\r\n";
            
            const encoder = new TextEncoder();
            await IOUtils.write(batPath, encoder.encode(batContent));
            
            Zotero.debug(`[Pandoc] 批处理: ${batPath}`);
            Zotero.debug(`[Pandoc] 命令: ${cmd}`);
            
            return new Promise(async (resolve, reject) => {
                try {
                    const cmdFile = Components.classes["@mozilla.org/file/local;1"]
                        .createInstance(Components.interfaces.nsIFile);
                    cmdFile.initWithPath("C:\\Windows\\System32\\cmd.exe");
                    
                    const process = Components.classes["@mozilla.org/process/util;1"]
                        .createInstance(Components.interfaces.nsIProcess);
                    
                    process.init(cmdFile);
                    process.run(true, ["/c", batPath], 2);
                    
                    const exitValue = process.exitValue;
                    Zotero.debug(`[Pandoc] 退出码: ${exitValue}`);
                    
                    // 读取错误日志
                    let errorLog = "";
                    try {
                        if (await IOUtils.exists(errorLogPath)) {
                            const errorBytes = await IOUtils.read(errorLogPath);
                            const decoder = new TextDecoder("utf-8");
                            errorLog = decoder.decode(errorBytes);
                        }
                    } catch (e) {}
                    
                    // 清理临时文件
                    try {
                        await IOUtils.remove(batPath, { ignoreAbsent: true });
                        await IOUtils.remove(errorLogPath, { ignoreAbsent: true });
                    } catch (e) {}
                    
                    if (exitValue === 0) {
                        const outputExists = await IOUtils.exists(outputPath);
                        if (outputExists) {
                            resolve();
                        } else {
                            reject(new Error(`Pandoc 执行完成但输出文件未生成\n${errorLog || ''}`));
                        }
                    } else if (exitValue === 9009) {
                        reject(new Error(
                            "无法找到 Pandoc 可执行文件。\n\n" +
                            "安装方法：\n" +
                            "1. Winget: winget install Pandoc.Pandoc\n" +
                            "2. Chocolatey: choco install pandoc\n" +
                            "3. 官网: https://pandoc.org/installing.html\n\n" +
                            "安装后在脚本顶部配置路径。"
                        ));
                    } else {
                        reject(new Error(`Pandoc 失败 (退出码: ${exitValue})\n\n${errorLog}`));
                    }
                } catch (error) {
                    try {
                        await IOUtils.remove(batPath, { ignoreAbsent: true });
                        await IOUtils.remove(errorLogPath, { ignoreAbsent: true });
                    } catch (e) {}
                    reject(error);
                }
            });
        }


        /**
         * 导出单个笔记（内部函数，不弹窗）
         */
        async function exportNoteInternal(noteItem, outputPath) {
            const tempDir = Zotero.getTempDirectory().path;
            
            // 转换为 Markdown
            const markdown = await noteToMarkdown(noteItem);
            
            // 保存临时文件
            const mdPath = PathUtils.join(tempDir, `${Zotero.Utilities.randomString(8)}.md`);
            await Zotero.File.putContentsAsync(mdPath, markdown);
            
            // 调用 Pandoc
            await runPandoc(mdPath, outputPath);
            
            // 清理
            await IOUtils.remove(mdPath, { ignoreAbsent: true });
        }


        /**
         * 显示成功提示
         */
        function showSuccess(path) {
            const result = window.confirm(
                `笔记已成功导出到:\n${path}\n\n点击"确定"打开文件夹`
            );
            
            if (result) {
                Zotero.File.reveal(path);
            }
        }


        //
        ============================================================================

        // 主入口

        //
        ============================================================================


        async function main() {
            // 1. 查找 Pandoc
            try {
                CONFIG.pandocPath = await findPandoc();
            } catch (e) {
                window.alert(e.message);
                return;
            }

            // 2. 收集笔记
            const noteItems = [];
            for (const selectedItem of selectedItems) {
                if (selectedItem.itemType === "note") {
                    noteItems.push(selectedItem);
                } else if (selectedItem.isRegularItem && selectedItem.isRegularItem()) {
                    const notes = selectedItem.getNotes();
                    for (const noteId of notes) {
                        noteItems.push(Zotero.Items.get(noteId));
                    }
                }
            }
            
            if (noteItems.length === 0) {
                window.alert("请先选择一个或多个笔记条目");
                return;
            }
            
            // 3. 导出
            if (noteItems.length === 1) {
                // 单个笔记
                const noteItem = noteItems[0];
                const title = getNoteTitle(noteItem);
                const outputPath = await pickSaveFile(`${title}.docx`);
                
                if (!outputPath) return;
                
                try {
                    await exportNoteInternal(noteItem, outputPath);
                    showSuccess(outputPath);
                } catch (error) {
                    Zotero.logError(error);
                    window.alert(`导出失败: ${error.message}`);
                }
            } else {
                // 批量导出
                const outputDir = await pickDirectory();
                if (!outputDir) return;
                
                const results = [];
                for (const noteItem of noteItems) {
                    try {
                        const title = getNoteTitle(noteItem);
                        const outputPath = PathUtils.join(outputDir, `${title}.docx`);
                        await exportNoteInternal(noteItem, outputPath);
                        results.push({ success: true, path: outputPath });
                    } catch (error) {
                        results.push({ success: false, error: error.message });
                    }
                }
                
                const successCount = results.filter(r => r.success).length;
                const failCount = results.length - successCount;
                
                if (successCount > 0) {
                    const firstSuccess = results.find(r => r.success);
                    const openFolder = window.confirm(
                        `批量导出完成\n成功: ${successCount} 个\n失败: ${failCount} 个\n\n点击"确定"打开文件夹`
                    );
                    if (openFolder && firstSuccess) {
                        Zotero.File.reveal(firstSuccess.path);
                    }
                } else {
                    window.alert(`导出失败，所有 ${failCount} 个笔记均失败`);
                }
            }
        }


        // 运行

        main().catch(error => {
            Zotero.logError(error);
            window.alert(`导出失败: ${error.message}`);
        });
      shortcut: Ctrl,Alt,p
      enabled: true
      menu: pandoc
      name: pandoc
      showInMenu:
        item: true
        collection: false
        tools: false
        reader: false
        readerAnnotation: false
    1765811014780-WvvdkPIt:
      event: 0
      operation: 4
      data: >-
        /**
         * @author StreamL
         * @date 2025-12-17
         * @version 5.0
         * @refs https://github.com/windingwind/zotero-actions-tags/discussions/477
         * 脚本功能：从所有选中的条目中提取指定 PDF 附件内带有指定"注释标签"的注释（转换为 HTML），
         * 同时提取所有元数据字段，并将结果合并到一个表格中。
         * 
         * v5 更新：新增"条目链接"字段，生成 zotero://select/library/items/XXX 格式的可点击链接
         * 
         * 使用说明：
         * 1. 在 Zotero 中，使用自带的 PDF 阅读器打开 PDF，并对需要的文字做高亮或注释，然后在注释的右侧面板中添加标签（tag），如"背景"、"材料"。
         * 2. 选中一个或多个条目后运行此脚本（使用传入的 items 或 item 变量）。
         * 3. 脚本会弹窗提示输入新笔记的标题和要提取的注释标签。
         * 4. 脚本会先自动删除每个条目中已生成的、包含这些标签关键字的提取注释笔记（避免重复）。
         * 5. 然后遍历每个条目，提取注释和所有元数据字段。
         * 6. 最后生成包含注释列和元数据列的表格笔记。
         * 
         * 表格结构：每行是一个条目，列包括：元数据字段列 + 注释标签列
         */

        if (item) return; // 仅对所有选中项执行一次


        // 避免重复声明错误

        var Zotero = typeof Zotero !== 'undefined' ? Zotero : require("Zotero");

        var window = typeof window !== 'undefined' ? window : require("window");

        var console = typeof console !== 'undefined' ? console :
        require("console");


        // 使用传入的 items 或 item 变量

        let selectedItems = [];

        if (typeof items !== "undefined" && items.length > 0) {
          selectedItems = items;
        } else if (typeof item !== "undefined") {
          selectedItems = [item];
        } else {
          window.alert("请先选择要处理的文献");
          return;
        }


        // 过滤掉附件和笔记，只保留有效条目

        selectedItems = selectedItems.filter(item => !item.isAttachment() &&
        !item.isNote());

        if (selectedItems.length === 0) {
          window.alert("所选项目中没有有效的条目（可能都是附件或笔记）");
          return;
        }


        // 弹窗提示输入新笔记的标题

        let noteTitle = window.prompt("请输入新笔记的标题：（默认使用当前时间）");

        if (noteTitle === null) {
          // 用户点击了取消按钮
          return;
        }

        if (noteTitle.trim() === '') {
          // 用户留空，使用默认时间
          const now = new Date();
          const year = now.getFullYear();
          const month = String(now.getMonth() + 1).padStart(2, '0');
          const day = String(now.getDate()).padStart(2, '0');
          const hours = String(now.getHours()).padStart(2, '0');
          const minutes = String(now.getMinutes()).padStart(2, '0');
          const seconds = String(now.getSeconds()).padStart(2, '0');
          noteTitle = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }


        // 创建进度窗口

        let progressWindow = new Zotero.ProgressWindow({ closeOnClick: false });

        progressWindow.changeHeadline("提取注释和元数据到表格");

        progressWindow.show();


        let progressIcon = 'chrome://zotero/skin/spinner-16px.png';

        let itemProgress = new progressWindow.ItemProgress(progressIcon,
        noteTitle.substring(0, 60));

        itemProgress.setProgress(0);

        itemProgress.setText("⏳ 正在扫描注释标签...");

        progressWindow.show();


        /**
         * 从所有选中的条目中提取所有注释标签
         */
        async function getAllAnnotationTags(items) {
          let allTags = new Set();
          
          for (let item of items) {
            if (item.isAttachment() || item.isNote()) {
              console.log(`[DEBUG] 跳过附件或笔记项目: ${item.id}`);
              continue;
            }
            
            const attachments = item.getAttachments();
            for (let attachmentId of attachments) {
              const attachment = await Zotero.Items.getAsync(attachmentId);
              if (attachment.attachmentContentType === "application/pdf") {
                const annots = attachment.getAnnotations();
                if (annots && annots.length > 0) {
                  for (let annot of annots) {
                    if (annot.getTags && Array.isArray(annot.getTags())) {
                      let tagsOnAnnot = annot.getTags().map(tagObj => tagObj.tag);
                      tagsOnAnnot.forEach(tag => allTags.add(tag));
                    }
                  }
                }
              }
            }
          }
          
          return Array.from(allTags).sort();
        }


        // 提取所有注释标签

        let availableTags = await getAllAnnotationTags(selectedItems);

        let skipAnnotations = false;


        if (availableTags.length === 0) {
          itemProgress.setProgress(20);
          itemProgress.setText("⚠️ 未找到任何带标签的注释");
          let continueWithoutTags = window.confirm("未找到任何带标签的注释。是否仍然创建仅包含元数据的笔记？");
          if (!continueWithoutTags) {
            itemProgress.setError();
            itemProgress.setText("❌ 用户取消操作");
            progressWindow.startCloseTimer(3000);
            return;
          }
          skipAnnotations = true;
        } else {
          itemProgress.setProgress(20);
          itemProgress.setText(`✓ 找到 ${availableTags.length} 个标签`);
        }


        // 让用户多选标签（如果有标签可选）

        let tagSelection = null;

        if (!skipAnnotations) {
          tagSelection = window.prompt(
            `找到以下注释标签：\n\n${availableTags.map((tag, idx) => `${idx + 1}. ${tag}`).join('\n')}\n\n请输入要提取的标签序号（用逗号分隔，如：1,3,5）\n或直接输入标签名称（用逗号分隔）\n输入 0 或留空可全选所有标签：`
          );

          if (tagSelection === null) {
            // 用户点击了取消按钮
            itemProgress.setError();
            itemProgress.setText("❌ 用户取消操作");
            progressWindow.startCloseTimer(3000);
            return;
          }
          
          // 如果用户留空，默认选择全部标签
          if (tagSelection.trim() === '') {
            tagSelection = '0';
          }
        }


        itemProgress.setProgress(25);

        itemProgress.setText(skipAnnotations ? "⏳ 准备提取元数据..." : "⏳
        正在解析标签选择...");


        // 解析用户输入

        let annotationTags = [];


        if (!skipAnnotations) {
          if (tagSelection.trim() === '0') {
            annotationTags = [...availableTags];
          } else {
            let inputs = tagSelection.split(/[,，;；]/).map(s => s.trim()).filter(s => s.length > 0);

            for (let input of inputs) {
              if (/^\d+$/.test(input)) {
                let index = parseInt(input) - 1;
                if (index >= 0 && index < availableTags.length) {
                  annotationTags.push(availableTags[index]);
                }
              } else {
                if (availableTags.includes(input)) {
                  annotationTags.push(input);
                }
              }
            }

            annotationTags = [...new Set(annotationTags)];
          }

          if (annotationTags.length === 0) {
            itemProgress.setError();
            itemProgress.setText("❌ 没有有效的标签选择");
            progressWindow.startCloseTimer(3000);
            return;
          }

          itemProgress.setProgress(30);
          itemProgress.setText(`✓ 已选择 ${annotationTags.length} 个标签: ${annotationTags.join(", ")}`);
        } else {
          itemProgress.setProgress(30);
          itemProgress.setText("✓ 跳过注释提取，仅提取元数据");
        }


        // 定义所有要提取的元数据字段

        const METADATA_FIELDS = [
          { name: "标题", variable: "title" },
          { name: "作者", variable: "creators", isSpecial: true },
          { name: "日期", variable: "date" },
          { name: "摘要", variable: "abstractNote" },
          { name: "条目链接", variable: "null", isSpecial: true }
        ];


        console.log(`[DEBUG] 总字段数: ${METADATA_FIELDS.length}`);

        console.log(`[DEBUG] 注释标签数: ${annotationTags.length}`);


        /**
         * 删除每个条目中已生成的、包含任一指定注释标签关键字的提取注释笔记
         */
        async function deleteIndividualAnnotationNotes(items, annotationTags) {
          itemProgress.setProgress(35);
          itemProgress.setText("⏳ 正在删除旧笔记...");
          
          let deletedCount = 0;
          for (let item of items) {
            if (item.isAttachment() || item.isNote()) {
              console.log(`[DEBUG] 跳过附件或笔记项目: ${item.id}`);
              continue;
            }
            
            const noteIDs = item.getNotes();
            console.log(`[DEBUG] 条目 "${item.getField("title")}" 有 ${noteIDs.length} 个笔记`);
            for (let id of noteIDs) {
              let note = Zotero.Items.get(id);
              let noteHTML = note.getNote();
              if (noteHTML && noteHTML.startsWith('<div data-citation-items')) {
                if (annotationTags.some(tag => noteHTML.includes(tag))) {
                  Zotero.Items.trashTx(id);
                  deletedCount++;
                  console.log(`[DEBUG] 删除旧笔记: ${note.getNoteTitle()}`);
                }
              }
            }
          }
          
          if (deletedCount > 0) {
            itemProgress.setText(`✓ 已删除 ${deletedCount} 个旧笔记`);
          }
        }


        /**
         * 从单个条目中，提取其 PDF 附件中所有带有 annotationTags 中任意一个标签的注释
         */
        async function extractAnnotationsFromItem(item) {
          let annotationsObj = {};
          annotationTags.forEach(tag => {
            annotationsObj[tag] = "";
          });
          
          if (item.isAttachment() || item.isNote()) {
            console.log(`[DEBUG] 跳过附件或笔记项目: ${item.id}`);
            return annotationsObj;
          }
          
          const attachments = item.getAttachments();
          console.log(`[DEBUG] 条目 "${item.getField("title")}" 有 ${attachments.length} 个附件`);
          
          let foundAnnotationsCount = 0;
          for (let attachmentId of attachments) {
            const attachment = await Zotero.Items.getAsync(attachmentId);
            if (attachment.attachmentContentType === "application/pdf") {
              const annots = attachment.getAnnotations();
              console.log(`[DEBUG] PDF附件有 ${annots ? annots.length : 0} 个注释`);
              if (annots && annots.length > 0) {
                for (let annot of annots) {
                  if (annot.getTags && Array.isArray(annot.getTags())) {
                    let tagsOnAnnot = annot.getTags().map(tagObj => tagObj.tag);
                    for (let wantedTag of annotationTags) {
                      if (tagsOnAnnot.includes(wantedTag)) {
                        foundAnnotationsCount++;
                        try {
                          let annotJSON = await Zotero.Annotations.toJSON(annot);
                          let res = Zotero.EditorInstanceUtilities.serializeAnnotations([
                            { ...annotJSON, attachmentItemID: annot.parentID }
                          ]);
                          let cleanHTML = res.html;
                          if (cleanHTML.startsWith('<div') && cleanHTML.endsWith('</div>')) {
                            cleanHTML = cleanHTML.replace(/^<div[^>]*>/, '').replace(/<\/div>$/, '');
                          }
                          annotationsObj[wantedTag] += cleanHTML;
                          console.log(`[DEBUG] 找到标签"${wantedTag}"的注释`);
                        } catch (error) {
                          console.error("转换注释为 HTML 时出错:", error);
                        }
                      }
                    }
                  }
                }
              }
            }
          }
          
          console.log(`[DEBUG] 条目 "${item.getField("title")}" 共找到 ${foundAnnotationsCount} 个匹配的注释`);
          return annotationsObj;
        }


        /**
         * 从条目中提取单个字段的值
         */
        function extractFieldValue(item, field) {
          try {
            if (field.isSpecial) {
              switch (field.name) {
                case "作者":
                  let creators = item.getCreators();
                  if (!creators || creators.length === 0) return "";
                  return creators.map(c => {
                    if (c.firstName && c.lastName) {
                      return `${c.lastName}, ${c.firstName}`;
                    } else if (c.name) {
                      return c.name;
                    } else if (c.lastName) {
                      return c.lastName;
                    } else {
                      return "";
                    }
                  }).filter(n => n).join("; ");
                
                case "文献类型":
                  return Zotero.ItemTypes.getLocalizedString(item.itemTypeID) || item.itemType || "";
                
                case "附件数量":
                  let attachments = Zotero.Items.get(item.getAttachments());
                  return attachments ? attachments.length.toString() : "0";
                
                case "子笔记数量":
                  let notes = item.getNotes();
                  return notes ? notes.length.toString() : "0";
                
                case "项目键":
                  return item.key || "";
                
                case "项目ID":
                  return item.id ? item.id.toString() : "";
                
                case "图书馆ID":
                  return item.libraryID ? item.libraryID.toString() : "";
                
                case "标签":
                  let tags = item.getTags();
                  if (!tags || tags.length === 0) return "";
                  return tags.map(t => t.tag).join(", ");
                
                case "第一个附件名称":
                  let attList = Zotero.Items.get(item.getAttachments());
                  if (!attList || attList.length === 0) return "";
                  return attList[0].getField("title") || "";
                
                case "附件链接":
                  let attList2 = Zotero.Items.get(item.getAttachments());
                  if (!attList2 || attList2.length === 0) return "";
                  let firstAtt = attList2[0];
                  if (firstAtt.isFileAttachment()) {
                    return `zotero://open-pdf/library/items/${firstAtt.key}`;
                  } else if (firstAtt.isLinkAttachment()) {
                    return firstAtt.getField("url") || "";
                  }
                  return "";
                
                case "条目链接":
                  // v5新增：生成 zotero://select/library/items/XXX 格式的链接
                  return `zotero://select/library/items/${item.key}`;
                
                default:
                  return "";
              }
            }
            
            if (!field.variable) {
              return "";
            }
            
            let value = item.getField(field.variable, false, true);
            return value || "";
            
          } catch (error) {
            console.log(`[DEBUG] 提取字段 "${field.name}" 失败:`, error);
            return "";
          }
        }


        /**
         * 从单个条目中提取所有元数据
         */
        function extractMetadataFromItem(item) {
          let metadata = {};
          
          for (let field of METADATA_FIELDS) {
            metadata[field.name] = extractFieldValue(item, field);
          }
          
          return metadata;
        }


        /**
         * 主处理函数：提取所有条目的注释和元数据并生成表格
         */
        async function combineAnnotationsAndMetadata(items) {
          itemProgress.setProgress(40);
          itemProgress.setText(`⏳ 正在处理 ${items.length} 个条目...`);
          
          let tableData = [];
          let processedCount = 0;
          
          for (let item of items) {
            if (item.isAttachment() || item.isNote()) {
              console.log(`[DEBUG] 跳过附件或笔记项目: ${item.id}`);
              continue;
            }
            
            let title = item.getField("title") || "无标题";
            console.log(`[DEBUG] 正在处理条目: ${title}`);
            
            processedCount++;
            let progress = 40 + Math.floor((processedCount / items.length) * 40);
            itemProgress.setProgress(progress);
            itemProgress.setText(`⏳ 正在提取数据 (${processedCount}/${items.length}): ${title.substring(0, 30)}...`);
            
            try {
              let itemAnnotations = await extractAnnotationsFromItem(item);
              let metadata = extractMetadataFromItem(item);
              tableData.push({ 
                annotations: itemAnnotations,
                metadata: metadata,
                item: item  // v5: 保存条目引用，用于生成链接
              });
            } catch (error) {
              console.error(`处理文献 "${title}" 时出错:`, error);
            }
          }
          
          if (tableData.length === 0) {
            itemProgress.setError();
            itemProgress.setText("❌ 未能提取任何数据");
            progressWindow.startCloseTimer(4000);
            return;
          }
          
          itemProgress.setProgress(80);
          itemProgress.setText(`✓ 已提取 ${tableData.length} 个条目的数据`);
          
          // 构建 HTML 表格
          let combinedHTML = `<h1>${noteTitle}</h1>\n`;
          combinedHTML += `<p>共 ${tableData.length} 个条目，${METADATA_FIELDS.length} 个元数据字段，${annotationTags.length} 个注释标签</p>\n`;
          combinedHTML += `<table border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; width: 100%;">\n`;
          
          // 表头：先是元数据字段列，后是注释标签列
          combinedHTML += `<tr style="background-color: #f0f0f0; font-weight: bold;">`;
          
          for (let field of METADATA_FIELDS) {
            combinedHTML += `<th style="text-align: left; padding: 8px; white-space: nowrap;">${field.name}</th>`;
          }
          
          annotationTags.forEach(tag => {
            combinedHTML += `<th style="text-align: left; padding: 8px; white-space: nowrap; background-color: #e8f4f8;">${tag}</th>`;
          });
          
          combinedHTML += `</tr>\n`;
          
          // 数据行
          tableData.forEach((row, index) => {
            let bgColor = index % 2 === 0 ? "#ffffff" : "#f9f9f9";
            combinedHTML += `<tr style="background-color: ${bgColor};">`;
            
            for (let field of METADATA_FIELDS) {
              let cellValue = row.metadata[field.name] || "";
              
              // v5: 特殊处理条目链接字段
              if (field.name === "条目链接" && cellValue) {
                let itemTitle = row.item.getField("title") || "打开条目";
                combinedHTML += `<td style="padding: 8px; vertical-align: top;"><a href="${cellValue}">${itemTitle}</a></td>`;
              } else {
                // 普通字段：转义HTML特殊字符
                cellValue = cellValue.replace(/&/g, "&amp;")
                                     .replace(/</g, "&lt;")
                                     .replace(/>/g, "&gt;")
                                     .replace(/"/g, "&quot;")
                                     .replace(/'/g, "&#39;");
                combinedHTML += `<td style="padding: 8px; vertical-align: top;">${cellValue}</td>`;
              }
            }
            
            annotationTags.forEach(tag => {
              let cellContent = row.annotations[tag] || "";
              combinedHTML += `<td style="padding: 8px; vertical-align: top;">${cellContent}</td>`;
            });
            
            combinedHTML += `</tr>\n`;
          });
          
          combinedHTML += `</table>\n`;
          
          itemProgress.setProgress(85);
          itemProgress.setText("⏳ 正在创建笔记...");
          
          let currentItem = items[0];
          let libraryID = currentItem.libraryID;
          console.log(`[DEBUG] 库ID: ${libraryID}`);
          
          let library = Zotero.Libraries.get(libraryID);
          console.log(`[DEBUG] 库名称: ${library.name}, 可编辑: ${library.editable}`);
          if (!library.editable) {
            itemProgress.setError();
            itemProgress.setText("❌ 该库为只读状态，无法创建笔记");
            progressWindow.startCloseTimer(4000);
            return null;
          }
          
          let collectionID = null;
          try {
            let zoteroPane = Zotero.getActiveZoteroPane();
            if (zoteroPane) {
              let selectedCollection = zoteroPane.getSelectedCollection(true);
              if (selectedCollection) {
                collectionID = selectedCollection;
                console.log(`[DEBUG] 当前分类ID: ${collectionID}`);
              }
            }
          } catch (e) {
            console.log("[DEBUG] 无法获取当前分类:", e);
          }
          
          itemProgress.setProgress(90);
          itemProgress.setText("⏳ 正在保存笔记...");
          
          let noteItem = new Zotero.Item("note");
          noteItem.libraryID = libraryID;
          noteItem.parentID = null;
          console.log(`[DEBUG] 笔记parentID设置为null(独立笔记)`);
          
          if (collectionID) {
            noteItem.addToCollection(collectionID);
            console.log(`[DEBUG] 笔记已添加到分类: ${collectionID}`);
          }
          
          noteItem.setNote(combinedHTML);
          console.log(`[DEBUG] 笔记内容已设置,长度: ${combinedHTML.length}`);
          
          await noteItem.saveTx();
          console.log(`[DEBUG] 笔记已保存,ID: ${noteItem.id}`);
          
          itemProgress.setProgress(100);
          itemProgress.setText(`✅ 成功创建笔记: ${noteTitle}`);
          progressWindow.startCloseTimer(3000);
          
          return noteItem;
        }


        // 先删除旧的提取笔记，再合并生成新的独立笔记

        deleteIndividualAnnotationNotes(selectedItems, annotationTags).then(()
        => {
          combineAnnotationsAndMetadata(selectedItems).then((noteItem) => {
            if (!noteItem) {
              itemProgress.setError();
              itemProgress.setText("❌ 处理过程中未能创建笔记");
              progressWindow.startCloseTimer(4000);
            }
          }).catch((error) => {
            console.error("合并注释和元数据时出错:", error);
            itemProgress.setError();
            itemProgress.setText(`❌ 错误: ${error.message}`);
            progressWindow.startCloseTimer(5000);
          });
        }).catch((error) => {
          console.error("删除旧笔记时出错:", error);
          itemProgress.setError();
          itemProgress.setText(`❌ 错误: ${error.message}`);
          progressWindow.startCloseTimer(5000);
        });
      shortcut: ''
      enabled: true
      menu: test_matrix
      name: test_matrix
      showInMenu:
        item: true
        collection: false
        tools: false
        reader: false
        readerAnnotation: false
    1770138569245-tya3h3zz:
      event: 0
      operation: 4
      data: >-
        /** * @author StreamL * @date 2025-12-17 * @version 5.0 * @refs
        https://github.com/windingwind/zotero-actions-tags/discussions/477 *
        脚本功能：从所有选中的条目中提取指定 PDF 附件内带有指定"注释标签"的注释（转换为 HTML）， *
        同时提取所有元数据字段，并将结果合并到一个表格中。 *  * v5 更新：新增"条目链接"字段，生成
        zotero://select/library/items/XXX 格式的可点击链接 *  * 使用说明： * 1. 在 Zotero
        中，使用自带的 PDF 阅读器打开 PDF，并对需要的文字做高亮或注释，然后在注释的右侧面板中添加标签（tag），如"背景"、"材料"。 *
        2. 选中一个或多个条目后运行此脚本（使用传入的 items 或 item 变量）。 * 3.
        脚本会弹窗提示输入新笔记的标题和要提取的注释标签。 * 4. 脚本会先自动删除每个条目中已生成的、包含这些标签关键字的提取注释笔记（避免重复）。
        * 5. 然后遍历每个条目，提取注释和所有元数据字段。 * 6. 最后生成包含注释列和元数据列的表格笔记。 *  *
        表格结构：每行是一个条目，列包括：元数据字段列 + 注释标签列 */

        if (item) return; // 仅对所有选中项执行一次

        // 避免重复声明错误 var Zotero = typeof Zotero !== 'undefined' ? Zotero :
        require("Zotero"); var window = typeof window !== 'undefined' ? window :
        require("window"); var console = typeof console !== 'undefined' ?
        console : require("console");

        // 使用传入的 items 或 item 变量 let selectedItems = []; if (typeof items !==
        "undefined" && items.length > 0) {
          selectedItems = items;
        } else if (typeof item !== "undefined") {
          selectedItems = [item];
        } else {
          window.alert("请先选择要处理的文献");
          return;
        }

        // 过滤掉附件和笔记，只保留有效条目 selectedItems = selectedItems.filter(item =>
        !item.isAttachment() && !item.isNote()); if (selectedItems.length === 0)
        {
          window.alert("所选项目中没有有效的条目（可能都是附件或笔记）");
          return;
        }

        // 弹窗提示输入新笔记的标题 let noteTitle = window.prompt("请输入新笔记的标题：（默认使用当前时间）");
        if (noteTitle === null) {
          // 用户点击了取消按钮
          return;
        } if (noteTitle.trim() === '') {
          // 用户留空，使用默认时间
          const now = new Date();
          const year = now.getFullYear();
          const month = String(now.getMonth() + 1).padStart(2, '0');
          const day = String(now.getDate()).padStart(2, '0');
          const hours = String(now.getHours()).padStart(2, '0');
          const minutes = String(now.getMinutes()).padStart(2, '0');
          const seconds = String(now.getSeconds()).padStart(2, '0');
          noteTitle = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // 创建进度窗口 let progressWindow = new Zotero.ProgressWindow({ closeOnClick:
        false }); progressWindow.changeHeadline("提取注释和元数据到表格");
        progressWindow.show();

        let progressIcon = 'chrome://zotero/skin/spinner-16px.png'; let
        itemProgress = new progressWindow.ItemProgress(progressIcon,
        noteTitle.substring(0, 60)); itemProgress.setProgress(0);
        itemProgress.setText("⏳ 正在扫描注释标签..."); progressWindow.show();

        /** * 从所有选中的条目中提取所有注释标签 */ async function getAllAnnotationTags(items) {
          let allTags = new Set();
          
          for (let item of items) {
            if (item.isAttachment() || item.isNote()) {
              console.log(`[DEBUG] 跳过附件或笔记项目: ${item.id}`);
              continue;
            }
            
            const attachments = item.getAttachments();
            for (let attachmentId of attachments) {
              const attachment = await Zotero.Items.getAsync(attachmentId);
              if (attachment.attachmentContentType === "application/pdf") {
                const annots = attachment.getAnnotations();
                if (annots && annots.length > 0) {
                  for (let annot of annots) {
                    if (annot.getTags && Array.isArray(annot.getTags())) {
                      let tagsOnAnnot = annot.getTags().map(tagObj => tagObj.tag);
                      tagsOnAnnot.forEach(tag => allTags.add(tag));
                    }
                  }
                }
              }
            }
          }
          
          return Array.from(allTags).sort();
        }

        // 提取所有注释标签 let availableTags = await
        getAllAnnotationTags(selectedItems); let skipAnnotations = false;

        if (availableTags.length === 0) {
          itemProgress.setProgress(20);
          itemProgress.setText("⚠️ 未找到任何带标签的注释");
          let continueWithoutTags = window.confirm("未找到任何带标签的注释。是否仍然创建仅包含元数据的笔记？");
          if (!continueWithoutTags) {
            itemProgress.setError();
            itemProgress.setText("❌ 用户取消操作");
            progressWindow.startCloseTimer(3000);
            return;
          }
          skipAnnotations = true;
        } else {
          itemProgress.setProgress(20);
          itemProgress.setText(`✓ 找到 ${availableTags.length} 个标签`);
        }

        // 让用户多选标签（如果有标签可选） let tagSelection = null; if (!skipAnnotations) {
          tagSelection = window.prompt(
            `找到以下注释标签：\n\n${availableTags.map((tag, idx) => `${idx + 1}. ${tag}`).join('\n')}\n\n请输入要提取的标签序号（用逗号分隔，如：1,3,5）\n或直接输入标签名称（用逗号分隔）\n输入 0 或留空可全选所有标签：`
          );

          if (tagSelection === null) {
            // 用户点击了取消按钮
            itemProgress.setError();
            itemProgress.setText("❌ 用户取消操作");
            progressWindow.startCloseTimer(3000);
            return;
          }
          
          // 如果用户留空，默认选择全部标签
          if (tagSelection.trim() === '') {
            tagSelection = '0';
          }
        }

        itemProgress.setProgress(25); itemProgress.setText(skipAnnotations ? "⏳
        准备提取元数据..." : "⏳ 正在解析标签选择...");

        // 解析用户输入 let annotationTags = [];

        if (!skipAnnotations) {
          if (tagSelection.trim() === '0') {
            annotationTags = [...availableTags];
          } else {
            let inputs = tagSelection.split(/[,，;；]/).map(s => s.trim()).filter(s => s.length > 0);

            for (let input of inputs) {
              if (/^\d+$/.test(input)) {
                let index = parseInt(input) - 1;
                if (index >= 0 && index < availableTags.length) {
                  annotationTags.push(availableTags[index]);
                }
              } else {
                if (availableTags.includes(input)) {
                  annotationTags.push(input);
                }
              }
            }

            annotationTags = [...new Set(annotationTags)];
          }

          if (annotationTags.length === 0) {
            itemProgress.setError();
            itemProgress.setText("❌ 没有有效的标签选择");
            progressWindow.startCloseTimer(3000);
            return;
          }

          itemProgress.setProgress(30);
          itemProgress.setText(`✓ 已选择 ${annotationTags.length} 个标签: ${annotationTags.join(", ")}`);
        } else {
          itemProgress.setProgress(30);
          itemProgress.setText("✓ 跳过注释提取，仅提取元数据");
        }

        // 定义所有要提取的元数据字段 const METADATA_FIELDS = [
          { name: "标题", variable: "title" },
          { name: "作者", variable: "creators", isSpecial: true },
          { name: "日期", variable: "date" },
          { name: "摘要", variable: "abstractNote" }
        ];

        console.log(`[DEBUG] 总字段数: ${METADATA_FIELDS.length}`);
        console.log(`[DEBUG] 注释标签数: ${annotationTags.length}`);

        /** * 删除每个条目中已生成的、包含任一指定注释标签关键字的提取注释笔记 */ async function
        deleteIndividualAnnotationNotes(items, annotationTags) {
          itemProgress.setProgress(35);
          itemProgress.setText("⏳ 正在删除旧笔记...");
          
          let deletedCount = 0;
          for (let item of items) {
            if (item.isAttachment() || item.isNote()) {
              console.log(`[DEBUG] 跳过附件或笔记项目: ${item.id}`);
              continue;
            }
            
            const noteIDs = item.getNotes();
            console.log(`[DEBUG] 条目 "${item.getField("title")}" 有 ${noteIDs.length} 个笔记`);
            for (let id of noteIDs) {
              let note = Zotero.Items.get(id);
              let noteHTML = note.getNote();
              if (noteHTML && noteHTML.startsWith('<div data-citation-items')) {
                if (annotationTags.some(tag => noteHTML.includes(tag))) {
                  Zotero.Items.trashTx(id);
                  deletedCount++;
                  console.log(`[DEBUG] 删除旧笔记: ${note.getNoteTitle()}`);
                }
              }
            }
          }
          
          if (deletedCount > 0) {
            itemProgress.setText(`✓ 已删除 ${deletedCount} 个旧笔记`);
          }
        }

        /** * 从单个条目中，提取其 PDF 附件中所有带有 annotationTags 中任意一个标签的注释 */ async function
        extractAnnotationsFromItem(item) {
          let annotationsObj = {};
          annotationTags.forEach(tag => {
            annotationsObj[tag] = "";
          });
          
          if (item.isAttachment() || item.isNote()) {
            console.log(`[DEBUG] 跳过附件或笔记项目: ${item.id}`);
            return annotationsObj;
          }
          
          const attachments = item.getAttachments();
          console.log(`[DEBUG] 条目 "${item.getField("title")}" 有 ${attachments.length} 个附件`);
          
          let foundAnnotationsCount = 0;
          for (let attachmentId of attachments) {
            const attachment = await Zotero.Items.getAsync(attachmentId);
            if (attachment.attachmentContentType === "application/pdf") {
              const annots = attachment.getAnnotations();
              console.log(`[DEBUG] PDF附件有 ${annots ? annots.length : 0} 个注释`);
              if (annots && annots.length > 0) {
                for (let annot of annots) {
                  if (annot.getTags && Array.isArray(annot.getTags())) {
                    let tagsOnAnnot = annot.getTags().map(tagObj => tagObj.tag);
                    for (let wantedTag of annotationTags) {
                      if (tagsOnAnnot.includes(wantedTag)) {
                        foundAnnotationsCount++;
                        try {
                          let annotJSON = await Zotero.Annotations.toJSON(annot);
                          let res = Zotero.EditorInstanceUtilities.serializeAnnotations([
                            { ...annotJSON, attachmentItemID: annot.parentID }
                          ]);
                          let cleanHTML = res.html;
                          if (cleanHTML.startsWith('<div') && cleanHTML.endsWith('</div>')) {
                            cleanHTML = cleanHTML.replace(/^<div[^>]*>/, '').replace(/<\/div>$/, '');
                          }
                          annotationsObj[wantedTag] += cleanHTML;
                          console.log(`[DEBUG] 找到标签"${wantedTag}"的注释`);
                        } catch (error) {
                          console.error("转换注释为 HTML 时出错:", error);
                        }
                      }
                    }
                  }
                }
              }
            }
          }
          
          console.log(`[DEBUG] 条目 "${item.getField("title")}" 共找到 ${foundAnnotationsCount} 个匹配的注释`);
          return annotationsObj;
        }

        /** * 从条目中提取单个字段的值 */ function extractFieldValue(item, field) {
          try {
            if (field.isSpecial) {
              switch (field.name) {
                case "作者":
                  let creators = item.getCreators();
                  if (!creators || creators.length === 0) return "";
                  return creators.map(c => {
                    if (c.firstName && c.lastName) {
                      return `${c.lastName}, ${c.firstName}`;
                    } else if (c.name) {
                      return c.name;
                    } else if (c.lastName) {
                      return c.lastName;
                    } else {
                      return "";
                    }
                  }).filter(n => n).join("; ");
                
                case "文献类型":
                  return Zotero.ItemTypes.getLocalizedString(item.itemTypeID) || item.itemType || "";
                
                case "附件数量":
                  let attachments = Zotero.Items.get(item.getAttachments());
                  return attachments ? attachments.length.toString() : "0";
                
                case "子笔记数量":
                  let notes = item.getNotes();
                  return notes ? notes.length.toString() : "0";
                
                case "项目键":
                  return item.key || "";
                
                case "项目ID":
                  return item.id ? item.id.toString() : "";
                
                case "图书馆ID":
                  return item.libraryID ? item.libraryID.toString() : "";
                
                case "标签":
                  let tags = item.getTags();
                  if (!tags || tags.length === 0) return "";
                  return tags.map(t => t.tag).join(", ");
                
                case "第一个附件名称":
                  let attList = Zotero.Items.get(item.getAttachments());
                  if (!attList || attList.length === 0) return "";
                  return attList[0].getField("title") || "";
                
                case "附件链接":
                  let attList2 = Zotero.Items.get(item.getAttachments());
                  if (!attList2 || attList2.length === 0) return "";
                  let firstAtt = attList2[0];
                  if (firstAtt.isFileAttachment()) {
                    return `zotero://open-pdf/library/items/${firstAtt.key}`;
                  } else if (firstAtt.isLinkAttachment()) {
                    return firstAtt.getField("url") || "";
                  }
                  return "";
                
                case "条目链接":
                  // v5新增：生成 zotero://select/library/items/XXX 格式的链接
                  return `zotero://select/library/items/${item.key}`;
                
                default:
                  return "";
              }
            }
            
            if (!field.variable) {
              return "";
            }
            
            let value = item.getField(field.variable, false, true);
            return value || "";
            
          } catch (error) {
            console.log(`[DEBUG] 提取字段 "${field.name}" 失败:`, error);
            return "";
          }
        }

        /** * 从单个条目中提取所有元数据 */ function extractMetadataFromItem(item) {
          let metadata = {};
          
          for (let field of METADATA_FIELDS) {
            metadata[field.name] = extractFieldValue(item, field);
          }
          
          return metadata;
        }

        /** * 主处理函数：提取所有条目的注释和元数据并生成表格 */ async function
        combineAnnotationsAndMetadata(items) {
          itemProgress.setProgress(40);
          itemProgress.setText(`⏳ 正在处理 ${items.length} 个条目...`);
          
          let tableData = [];
          let processedCount = 0;
          
          for (let item of items) {
            if (item.isAttachment() || item.isNote()) {
              console.log(`[DEBUG] 跳过附件或笔记项目: ${item.id}`);
              continue;
            }
            
            let title = item.getField("title") || "无标题";
            console.log(`[DEBUG] 正在处理条目: ${title}`);
            
            processedCount++;
            let progress = 40 + Math.floor((processedCount / items.length) * 40);
            itemProgress.setProgress(progress);
            itemProgress.setText(`⏳ 正在提取数据 (${processedCount}/${items.length}): ${title.substring(0, 30)}...`);
            
            try {
              let itemAnnotations = await extractAnnotationsFromItem(item);
              let metadata = extractMetadataFromItem(item);
              tableData.push({ 
                annotations: itemAnnotations,
                metadata: metadata,
                item: item  // v5: 保存条目引用，用于生成链接
              });
            } catch (error) {
              console.error(`处理文献 "${title}" 时出错:`, error);
            }
          }
          
          if (tableData.length === 0) {
            itemProgress.setError();
            itemProgress.setText("❌ 未能提取任何数据");
            progressWindow.startCloseTimer(4000);
            return;
          }
          
          itemProgress.setProgress(80);
          itemProgress.setText(`✓ 已提取 ${tableData.length} 个条目的数据`);
          
          // 构建 HTML 表格
          let combinedHTML = `<h1>${noteTitle}</h1>\n`;
          combinedHTML += `<p>共 ${tableData.length} 个条目，${METADATA_FIELDS.length} 个元数据字段，${annotationTags.length} 个注释标签</p>\n`;
          combinedHTML += `<table border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; width: 100%;">\n`;
          
          // 表头：先是元数据字段列，后是注释标签列
          combinedHTML += `<tr style="background-color: #f0f0f0; font-weight: bold;">`;
          
          for (let field of METADATA_FIELDS) {
            combinedHTML += `<th style="text-align: left; padding: 8px; white-space: nowrap;">${field.name}</th>`;
          }
          
          annotationTags.forEach(tag => {
            combinedHTML += `<th style="text-align: left; padding: 8px; white-space: nowrap; background-color: #e8f4f8;">${tag}</th>`;
          });
          
          combinedHTML += `</tr>\n`;
          
          // 数据行
          tableData.forEach((row, index) => {
            let bgColor = index % 2 === 0 ? "#ffffff" : "#f9f9f9";
            combinedHTML += `<tr style="background-color: ${bgColor};">`;
            
            for (let field of METADATA_FIELDS) {
              let cellValue = row.metadata[field.name] || "";
              
              // v5: 特殊处理条目链接字段
              if (field.name === "条目链接" && cellValue) {
                let itemTitle = row.item.getField("title") || "打开条目";
                combinedHTML += `<td style="padding: 8px; vertical-align: top;"><a href="${cellValue}">${itemTitle}</a></td>`;
              } else {
                // 普通字段：转义HTML特殊字符
                cellValue = cellValue.replace(/&/g, "&amp;")
                                    .replace(/</g, "&lt;")
                                    .replace(/>/g, "&gt;")
                                    .replace(/"/g, "&quot;")
                                    .replace(/'/g, "&#39;");
                combinedHTML += `<td style="padding: 8px; vertical-align: top;">${cellValue}</td>`;
              }
            }
            
            annotationTags.forEach(tag => {
              let cellContent = row.annotations[tag] || "";
              combinedHTML += `<td style="padding: 8px; vertical-align: top;">${cellContent}</td>`;
            });
            
            combinedHTML += `</tr>\n`;
          });
          
          combinedHTML += `</table>\n`;
          
          itemProgress.setProgress(85);
          itemProgress.setText("⏳ 正在创建笔记...");
          
          let currentItem = items[0];
          let libraryID = currentItem.libraryID;
          console.log(`[DEBUG] 库ID: ${libraryID}`);
          
          let library = Zotero.Libraries.get(libraryID);
          console.log(`[DEBUG] 库名称: ${library.name}, 可编辑: ${library.editable}`);
          if (!library.editable) {
            itemProgress.setError();
            itemProgress.setText("❌ 该库为只读状态，无法创建笔记");
            progressWindow.startCloseTimer(4000);
            return null;
          }
          
          let collectionID = null;
          try {
            let zoteroPane = Zotero.getActiveZoteroPane();
            if (zoteroPane) {
              let selectedCollection = zoteroPane.getSelectedCollection(true);
              if (selectedCollection) {
                collectionID = selectedCollection;
                console.log(`[DEBUG] 当前分类ID: ${collectionID}`);
              }
            }
          } catch (e) {
            console.log("[DEBUG] 无法获取当前分类:", e);
          }
          
          itemProgress.setProgress(90);
          itemProgress.setText("⏳ 正在保存笔记...");
          
          let noteItem = new Zotero.Item("note");
          noteItem.libraryID = libraryID;
          noteItem.parentID = null;
          console.log(`[DEBUG] 笔记parentID设置为null(独立笔记)`);
          
          if (collectionID) {
            noteItem.addToCollection(collectionID);
            console.log(`[DEBUG] 笔记已添加到分类: ${collectionID}`);
          }
          
          noteItem.setNote(combinedHTML);
          console.log(`[DEBUG] 笔记内容已设置,长度: ${combinedHTML.length}`);
          
          await noteItem.saveTx();
          console.log(`[DEBUG] 笔记已保存,ID: ${noteItem.id}`);
          
          itemProgress.setProgress(100);
          itemProgress.setText(`✅ 成功创建笔记: ${noteTitle}`);
          progressWindow.startCloseTimer(3000);
          
          return noteItem;
        }

        // 先删除旧的提取笔记，再合并生成新的独立笔记 deleteIndividualAnnotationNotes(selectedItems,
        annotationTags).then(() => {
          combineAnnotationsAndMetadata(selectedItems).then((noteItem) => {
            if (!noteItem) {
              itemProgress.setError();
              itemProgress.setText("❌ 处理过程中未能创建笔记");
              progressWindow.startCloseTimer(4000);
            }
          }).catch((error) => {
            console.error("合并注释和元数据时出错:", error);
            itemProgress.setError();
            itemProgress.setText(`❌ 错误: ${error.message}`);
            progressWindow.startCloseTimer(5000);
          });
        }).catch((error) => {
          console.error("删除旧笔记时出错:", error);
          itemProgress.setError();
          itemProgress.setText(`❌ 错误: ${error.message}`);
          progressWindow.startCloseTimer(5000);
        });
      shortcut: ''
      enabled: true
      menu: 🗄️文献矩阵
      name: Matrix
      showInMenu:
        item: true
        collection: false
        tools: false
        reader: false
        readerAnnotation: false
