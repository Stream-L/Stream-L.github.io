    1762443490055-WvvdkPIt:
      event: 0
      operation: 4
      data: >
        /**
         * @author Mulei
         * 脚本功能：基于Better Notes模板创建笔记，并使用LLM填充内容
         * 
         * 使用说明：
         * 1. 选中一个条目或条目下的笔记
         * 2. 运行此脚本
         * 3. 从模板列表中选择一个模板
         * 4. 脚本会提取条目元数据和PDF全文，使用LLM填充模板
         * 5. 生成的笔记将作为条目的子笔记保存
         */

        if (item) return; // 仅对所有选中项执行一次


        const Zotero = require("Zotero");

        const window = require("window");

        const console = require("console");


        // ========== 配置区域 ==========

        const API_URL = "https://api.siliconflow.cn/v1/chat/completions";

        const API_KEY = "sk-hwyqxzalzqbymjquhyriavjzlwblefoydirveedurckopxvw";

        const MODEL_NAME = "Qwen/Qwen3-8B";

        const AI_TEMPERATURE = 0.7;

        const AI_MAX_TOKENS = 8192;

        // ==============================


        // 获取选中的项目

        let selectedItems = [];

        if (typeof items !== "undefined" && items.length > 0) {
          selectedItems = items;
        } else if (typeof item !== "undefined") {
          selectedItems = [item];
        } else {
          window.alert("请先选择要处理的条目或笔记");
          return;
        }


        // 只处理第一个选中的项目

        let targetItem = selectedItems[0];

        let parentItem = null;


        // 判断选中的是条目还是笔记

        if (targetItem.isNote()) {
          // 如果选中的是笔记，获取其父条目
          let parentID = targetItem.parentID;
          if (parentID) {
            parentItem = Zotero.Items.get(parentID);
          } else {
            window.alert("选中的笔记没有关联的条目");
            return;
          }
        } else if (targetItem.isRegularItem()) {
          // 如果选中的是条目
          parentItem = targetItem;
        } else if (targetItem.isAttachment()) {
          // 如果选中的是附件，获取其父条目
          let parentID = targetItem.parentID;
          if (parentID) {
            parentItem = Zotero.Items.get(parentID);
          } else {
            window.alert("选中的附件没有关联的条目");
            return;
          }
        } else {
          window.alert("请选择一个有效的条目、笔记或附件");
          return;
        }


        // 创建进度窗口

        let progressWindow = new Zotero.ProgressWindow({ closeOnClick: false });

        progressWindow.changeHeadline("AI模板笔记生成");

        progressWindow.show();


        let progressIcon = 'chrome://zotero/skin/spinner-16px.png';

        let itemTitle = parentItem.getField("title") || "无标题";

        let itemProgress = new progressWindow.ItemProgress(progressIcon,
        itemTitle.substring(0, 60));

        itemProgress.setProgress(0);

        itemProgress.setText("⏳ 正在准备...");

        progressWindow.show();


        /**
         * 获取Better Notes的模板列表并让用户选择
         */
        async function selectTemplate() {
          try {
            // 尝试使用Better Notes API获取模板
            const BetterNotes = Zotero.BetterNotes;
            if (!BetterNotes) {
              throw new Error("Better Notes插件未安装或未启用");
            }
            
            // 获取所有模板的键名
            const templateKeys = BetterNotes.api.template.getTemplateKeys();
            
            if (!templateKeys || templateKeys.length === 0) {
              throw new Error("未找到任何模板");
            }
            
            // 构建模板列表显示文本
            const templateList = templateKeys.map((key, idx) => `${idx + 1}. ${key}`).join('\n');
            
            // 使用 prompt 让用户输入数字选择
            const selection = window.prompt(
              `找到以下模板：\n\n${templateList}\n\n请输入模板序号（1-${templateKeys.length}）：`
            );
            
            if (!selection) {
              return null;
            }
            
            const selectedIndex = parseInt(selection) - 1;
            if (isNaN(selectedIndex) || selectedIndex < 0 || selectedIndex >= templateKeys.length) {
              throw new Error("无效的模板序号");
            }
            
            return templateKeys[selectedIndex];
            
          } catch (error) {
            console.error("选择模板失败:", error);
            throw error;
          }
        }


        /**
         * 提取条目的元数据
         */
        function extractItemMetadata(item) {
          const title = item.getField("title") || "";
          const abstractNote = item.getField("abstractNote") || "";
          const creators = item.getCreators()
            .map((c) => (c.firstName + " " + c.lastName).trim())
            .join("; ");
          const publicationTitle = item.getField("publicationTitle") || "";
          const date = item.getField("date") || "";
          const doi = item.getField("DOI") || "";
          const url = item.getField("url") || "";
          const itemType = Zotero.ItemTypes.getLocalizedString(item.itemTypeID);
          
          return {
            title,
            abstractNote,
            creators,
            publicationTitle,
            date,
            doi,
            url,
            itemType
          };
        }


        /**
         * 提取PDF全文
         */
        async function extractPDFFullText(item) {
          try {
            let attachments = Zotero.Items.get(item.getAttachments()).filter(a => a.isPDFAttachment());
            
            if (attachments.length === 0) {
              return null;
            }
            
            // 提取第一个PDF的全文
            let pdfAttachment = attachments[0];
            let result = await Zotero.PDFWorker.getFullText(pdfAttachment.id, null, true);
            let text = result && result.text ? result.text.trim() : '';
            
            // 限制文本长度，避免超过API限制（保留前20000字符）
            if (text.length > 20000) {
              text = text.substring(0, 20000) + "\n\n[文本过长，已截断...]";
            }
            
            return text;
          } catch (error) {
            console.error("提取PDF全文失败:", error);
            return null;
          }
        }


        /**
         * 使用LLM填充模板内容
         */
        async function fillTemplateWithLLM(templateContent, metadata, fullText)
        {
          const hasFullText = fullText && fullText.length > 0;
          
          // 限制prompt总长度,避免超过模型上下文限制
          let limitedFullText = fullText;
          if (hasFullText && fullText.length > 15000) {
            limitedFullText = fullText.substring(0, 15000) + "\n\n[文本过长，已截断...]";
          }
          
          // 限制模板内容长度
          let limitedTemplate = templateContent;
          if (templateContent.length > 3000) {
            limitedTemplate = templateContent.substring(0, 3000) + "\n\n[模板过长，已截断...]";
          }
          
          const prompt = `你是一个学术笔记助手。我需要你根据提供的文献信息填写笔记模板。

        ## 文献元数据：

        - 标题：${metadata.title}

        - 作者：${metadata.creators}

        - 期刊/来源：${metadata.publicationTitle}

        - 发表日期：${metadata.date}

        - 类型：${metadata.itemType}

        - DOI：${metadata.doi}

        ${metadata.abstractNote ? `- 摘要：${metadata.abstractNote.substring(0,
        1000)}` : ''}


        ${hasFullText ? `## 文献全文片段：\n${limitedFullText}\n` : '##
        注意：没有提供文献全文，请仅基于元数据填写模板。\n'}


        ## 笔记模板：

        ${limitedTemplate}


        ## 任务要求：

        1. 仔细阅读上述文献信息${hasFullText ? '（包括全文）' : '（仅元数据）'}

        2. 根据模板中的提示和结构，填写相应内容

        3. 保持模板的原有结构和标题

        4. 如果模板中有占位符（如 {{...}}），请用实际内容替换

        5. 如果某些信息无法从文献中获取，可以标注"暂无"或"需补充"

        6. 用中文撰写，保持学术性和专业性

        7. 输出完整的填充后的笔记内容，保持Markdown格式


        请直接输出填充后的笔记内容，不要有任何前缀或解释：`;

          const payload = {
            model: MODEL_NAME,
            messages: [
              { 
                role: "system", 
                content: "你是一个专业的学术笔记助手，擅长分析文献并撰写结构化笔记。你会严格按照模板要求填写内容，保持学术规范。" 
              },
              { role: "user", content: prompt }
            ],
            temperature: AI_TEMPERATURE,
            max_tokens: AI_MAX_TOKENS
          };

          try {
            console.log("=".repeat(60));
            console.log("[DEBUG] 发送请求到API...");
            console.log("[DEBUG] API URL:", API_URL);
            console.log("[DEBUG] Model:", MODEL_NAME);
            console.log("[DEBUG] Prompt长度:", prompt.length, "字符");
            console.log("[DEBUG] Temperature:", AI_TEMPERATURE);
            console.log("[DEBUG] Max Tokens:", AI_MAX_TOKENS);
            console.log("=".repeat(60));
            
            const response = await fetch(API_URL, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${API_KEY}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify(payload)
            });

            console.log("[DEBUG] HTTP状态码:", response.status, response.statusText);

            if (!response.ok) {
              const errorText = await response.text();
              console.error("=".repeat(60));
              console.error("[ERROR] API错误响应:");
              console.error("状态码:", response.status, response.statusText);
              console.error("响应内容:", errorText);
              console.error("=".repeat(60));
              
              // 在进度窗口也显示详细错误
              throw new Error(`API错误 ${response.status}: ${errorText.substring(0, 200)}`);
            }

            const data = await response.json();
            const content = data.choices?.[0]?.message?.content || "";
            
            if (!content) {
              console.error("[ERROR] LLM未返回有效内容");
              console.error("完整响应:", JSON.stringify(data, null, 2));
              throw new Error("LLM未返回有效内容");
            }
            
            console.log("=".repeat(60));
            console.log("[SUCCESS] 成功获取LLM响应");
            console.log("响应内容长度:", content.length, "字符");
            console.log("响应前200字符:", content.substring(0, 200));
            console.log("=".repeat(60));
            
            return content;
          } catch (error) {
            console.error("=".repeat(60));
            console.error("[ERROR] LLM API调用失败");
            console.error("错误类型:", error.name);
            console.error("错误信息:", error.message);
            console.error("完整错误:", error);
            console.error("=".repeat(60));
            throw error;
          }
        }


        /**
         * 主流程
         */
        async function main() {
          try {
            // 1. 让用户选择模板
            itemProgress.setProgress(10);
            itemProgress.setText("⏳ 正在加载模板列表...");
            
            const selectedTemplateKey = await selectTemplate();
            
            if (!selectedTemplateKey) {
              itemProgress.setError();
              itemProgress.setText("❌ 未选择模板");
              progressWindow.startCloseTimer(2000);
              return;
            }
            
            itemProgress.setProgress(20);
            itemProgress.setText(`✓ 已选择模板: ${selectedTemplateKey}`);
            
            // 2. 先创建一个空笔记作为目标笔记
            itemProgress.setProgress(25);
            itemProgress.setText("⏳ 正在创建笔记...");
            
            const noteItem = new Zotero.Item("note");
            noteItem.libraryID = parentItem.libraryID;
            noteItem.parentID = parentItem.id;
            await noteItem.saveTx();
            
            // 3. 使用 Better Notes 的模板引擎填充笔记
            const BetterNotes = Zotero.BetterNotes;
            let templateHTML = '';
            
            itemProgress.setProgress(30);
            itemProgress.setText("⏳ 正在应用模板...");
            
            try {
              // 根据模板类型选择不同的运行方法
              if (selectedTemplateKey.toLowerCase().startsWith("[item]")) {
                // Item 模板 - 会自动填充条目的元数据变量
                templateHTML = await BetterNotes.api.template.runItemTemplate(selectedTemplateKey, {
                  itemIds: [parentItem.id],
                  targetNoteId: noteItem.id,
                });
              } else {
                // Text 模板 - 普通文本模板
                templateHTML = await BetterNotes.api.template.runTextTemplate(selectedTemplateKey, {
                  targetNoteId: noteItem.id,
                });
              }
              
              // 将模板结果插入笔记
              await BetterNotes.api.note.insert(noteItem, templateHTML, -1);
              
              itemProgress.setProgress(50);
              itemProgress.setText("✓ 模板应用完成");
              
            } catch (error) {
              console.error("应用模板失败:", error);
              throw new Error(`应用模板失败: ${error.message}`);
            }
            
            // 4. 提取元数据（用于LLM补充）
            itemProgress.setProgress(55);
            itemProgress.setText("⏳ 正在提取文献元数据...");
            
            const metadata = extractItemMetadata(parentItem);
            
            // 5. 尝试提取PDF全文
            itemProgress.setProgress(60);
            itemProgress.setText("⏳ 正在提取PDF全文...");
            
            const fullText = await extractPDFFullText(parentItem);
            
            if (fullText) {
              itemProgress.setProgress(70);
              itemProgress.setText(`✓ 已提取全文 (${Math.floor(fullText.length / 1000)}k 字符)`);
            } else {
              itemProgress.setProgress(70);
              itemProgress.setText("⚠️ 未找到PDF全文，将仅使用元数据");
            }
            
            // 6. 获取当前笔记内容（作为模板基础）
            const currentNoteHTML = noteItem.getNote();
            // 将HTML转为纯文本或Markdown（简单处理）
            let currentNoteText = currentNoteHTML
              .replace(/<[^>]*>/g, ' ')  // 移除HTML标签
              .replace(/&nbsp;/g, ' ')
              .replace(/&quot;/g, '"')
              .replace(/&amp;/g, '&')
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/\s+/g, ' ')
              .trim();
            
            // 7. 调用LLM增强笔记内容
            itemProgress.setProgress(75);
            itemProgress.setText("⏳ 正在调用AI增强笔记...");
            
            const enhancedContent = await fillTemplateWithLLM(currentNoteText, metadata, fullText);
            
            itemProgress.setProgress(90);
            itemProgress.setText("✓ AI增强完成");
            
            // 8. 将增强后的内容转换回HTML并更新笔记
            itemProgress.setProgress(92);
            itemProgress.setText("⏳ 正在更新笔记...");
            
            let enhancedHTML = '';
            try {
              enhancedHTML = BetterNotes.api.convert.md2html(enhancedContent);
            } catch (error) {
              console.log("Markdown转换失败，使用备用方案");
              enhancedHTML = `<pre style="white-space: pre-wrap; font-family: 'Segoe UI', sans-serif; font-size: 14px;">${Zotero.Utilities.text2html(enhancedContent)}</pre>`;
            }
            
            noteItem.setNote(enhancedHTML);
            await noteItem.saveTx();
            
            itemProgress.setProgress(100);
            itemProgress.setText(`✅ 成功创建AI增强笔记 (模板: ${selectedTemplateKey})`);
            progressWindow.startCloseTimer(3000);
            
          } catch (error) {
            console.error("生成笔记失败:", error);
            itemProgress.setError();
            itemProgress.setText(`❌ 错误: ${error.message}`);
            progressWindow.startCloseTimer(5000);
          }
        }


        // 执行主流程

        main();
