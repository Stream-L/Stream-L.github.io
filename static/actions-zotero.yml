    1762247159200-WvvdkPIt:
      event: 0
      operation: 4
      data: >-
        // 该脚本用于为Zotero中选中的项目生成可复制的链接，并根据配置生成不同格式的链接文本

        // 功能概述：

        // 1. 支持为选中的文献、附件、注释或集合生成链接

        // 2. 可配置链接文本来源、链接格式和链接行为

        // 3. 能根据项目类型自动调整链接目标（如PDF附件直接链接到打开PDF）

        // 4. 生成的链接可复制到剪贴板，支持HTML、Markdown和纯文本格式


        // @author windingwind, garth74

        // @link
        https://github.com/windingwind/zotero-actions-tags/discussions/115

        // @usage 选中库中的项目并按下分配的快捷键

        // @update Mon, 22 Jan 2024 00:10:18 GMT (by new Date().toGMTString())


        // 可编辑设置区域

        /** @type {string} 用于作为链接文本的字段名，使用引用键时设置为"citationKey" */

        let linkTextField = "title";


        /** @type {'html' | 'md' | 'plain'} 生成的链接类型 */

        let linkType = "html";


        /** @type {boolean} 若为true，生成的链接将指向当前选中的集合 */

        let useColl = false;


        /** @type {boolean} 若为true，当选中项目是笔记时使用Better Notes的zotero://note链接 */

        let useNoteLink = false;


        /** @type {'select' | 'open-pdf' | 'auto'}
        链接行为：select-选中项目，open-pdf-打开PDF，auto-自动判断 */

        let linkAction = "auto"; // auto模式：对PDF和注释使用open-pdf，其他使用select


        // 脚本核心逻辑

        // 为提高效率，对所有选中项目只执行一次

        if (item) return;

        item = items[0];

        if (!item && !collection) return "[Copy Zotero Link] 未选中项目";


        // 处理集合链接：强制使用select行为并启用集合模式

        if (collection) {
          linkAction = "select";
          useColl = true;
        }


        // 自动判断链接行为

        if (linkAction === "auto") {
          if (item.isPDFAttachment() || item.isAnnotation()) {
            linkAction = "open-pdf";
          } else {
            linkAction = "select";
          }
        }


        const uriParts = [];

        let uriParams = "";


        let targetItem = item;

        // 处理PDF打开行为

        if (linkAction === "open-pdf") {
          uriParts.push("zotero://open-pdf");
          // 对于普通项目，查找最佳PDF附件
          if (item.isRegularItem()) {
            targetItem = (await item.getBestAttachments()).find((att) =>
              att.isPDFAttachment()
            );
          } 
          // 对于注释，链接到其所在PDF并定位到对应页面
          else if (item.isAnnotation()) {
            targetItem = item.parentItem;
            let pageIndex = 1;
            try {
              pageIndex = JSON.parse(item.annotationPosition).pageIndex + 1;
            } catch (e) {
              Zotero.warn(e);
            }
            uriParams = `?page=${pageIndex}&annotation=${item.key}`;
          }
        } 

        // 处理项目选中行为

        else {
          uriParts.push("zotero://select");
          if (item?.isAnnotation()) {
            targetItem = item.parentItem;
          }
        }


        // 验证目标项目有效性

        if (!targetItem && !collection) return "[Copy Zotero Link] 项目无效";


        // 生成链接文本

        let linkText;

        if (collection) {
          // 集合链接使用集合名称作为文本
          linkText = collection.name;
        } else if (item.isAttachment()) {
          // 附件使用其顶层项目的指定字段作为文本
          linkText = Zotero.Items.getTopLevel([item])[0].getField(linkTextField);
        } else if (item.isAnnotation()) {
          // 注释链接文本包含源项目信息和注释内容
          linkText = `${targetItem.getField(linkTextField)}(${
            item.annotationComment || item.annotationText || "annotation"
          })`;
        } else {
          // 普通项目使用指定字段作为文本
          linkText = item.getField(linkTextField);
        }


        // 构建链接的库/群组部分

        let libraryType = (collection || item).library.libraryType;

        if (libraryType === "user") {
          uriParts.push("library");
        } else {
          uriParts.push(
            `groups/${Zotero.Libraries.get((collection || item).libraryID).groupID}`
          );
        }


        // 处理集合特定链接

        if (useColl) {
          let coll = collection || Zotero.getActiveZoteroPane().getSelectedCollection();
          if (!!coll) uriParts.push(`collections/${coll.key}`);
        }


        // 添加项目标识部分

        if (!collection) {
          uriParts.push(`items/${targetItem.key}`);
        }


        // 组合链接并添加参数

        let uri = uriParts.join("/");

        if (uriParams) {
          uri += uriParams;
        }


        // 处理Better Notes笔记链接

        if (useNoteLink && item?.isNote() && Zotero.BetterNotes) {
          uri = Zotero.BetterNotes.api.convert.note2link(item);
        }


        // 将生成的链接复制到剪贴板

        const clipboard = new Zotero.ActionsTags.api.utils.ClipboardHelper();

        if (linkType == "html") {
          clipboard.addText(`<a href="${uri}">${linkText}</a>`, "text/unicode");
        } else if (linkType == "md") {
          clipboard.addText(`[${linkText}](${uri})`, "text/unicode");
        } else {
          clipboard.addText(uri, "text/unicode");
        }


        // 额外添加HTML格式到剪贴板（确保兼容性）

        clipboard.addText(`<a href="${uri}">${linkText}</a>`, "text/html");


        clipboard.copy();


        return `[Copy Zotero Link] 链接 ${uri} 已复制。`;
      shortcut: Shift,Ctrl,l
      enabled: true
      menu: 🔗复制链接
      name: Copy Zotero Link
      showInMenu:
        item: true
        collection: false
        tools: false
        reader: false
        readerAnnotation: false
    1762415001345-WvvdkPIt:
      event: 0
      operation: 4
      data: >

        /**
         * Zotero AI Tag Generator (for SiliconFlow)
         * 仅基于论文元数据和摘要生成多层级标签
         * 使用 response_format={"type": "json_object"} 确保返回标准JSON
         */


        const apiUrl = "https://api.siliconflow.cn/v1/chat/completions";

        const apiKey = "sk-hwyqxzalzqbymjquhyriavjzlwblefoydirveedurckopxvw"; //
        ← 在这里填入你的硅基流动 API Token

        const modelName = "Qwen/Qwen3-8B";

        const aiTemperature = 0.7;

        const aiMaxTokens = 4096;


        if (!item) return;


        try {
            const isAttachment = item.isAttachment();
            const isRegular = item.isRegularItem() && item.isTopLevelItem();
            if (!isRegular && !isAttachment) return;

            let targetItem = item;
            if (isAttachment) {
                const parentID = item.parentID;
                if (parentID) targetItem = Zotero.Items.get(parentID);
                else return;
            }

            const title = targetItem.getField("title") || "";
            const abstractNote = targetItem.getField("abstractNote") || "";
            const creators = targetItem
                .getCreators()
                .map((c) => (c.firstName + " " + c.lastName).trim())
                .join("; ");
            const publicationTitle = targetItem.getField("publicationTitle") || "";
            const date = targetItem.getField("date") || "";
            const doi = targetItem.getField("DOI") || "";
            const url = targetItem.getField("url") || "";

            let progressWindow = new Zotero.ProgressWindow({ closeOnClick: true });
            progressWindow.changeHeadline("AI标签生成");
            let itemProgress = new progressWindow.ItemProgress(
                'chrome://zotero/skin/spinner-16px.png',
                title.substring(0, 60)
            );
            itemProgress.setText("⏳ 正在生成AI标签...");
            progressWindow.show();

            // === 核心Prompt ===
            const prompt = `

        你是一名管理科学与工程领域的论文分类助手，负责为文献添加多层级标签方便后续整理和检索。根据论文的标题、作者、摘要和出版信息，生成3~6个多层级标签（以“/”分割层级）。标签体系必须严格遵循“范式”部分的分类标准，但在其他部分，可以根据论文中的关键词拓展标签，而不必局限于已给出的标签。确保标签的选择和扩展与论文内容紧密相关，体现论文的核心话题。


        标签体系（“范式”部分严格遵守，其他部分根据原文关键词拓展，没有提到明确关键词的不要添加）：


        #范式/实证 #范式/理论 #范式/模型构建 #范式/综述


        #方法/统计分析 #方法/机器学习 #方法/系统动力学 #方法/优化方法 （还可以是其他类型的方法，甚至拓展到三级标题）


        #数据/来源/……（如公开数据集） #数据/开源代码 #数据/特征/图像 #数据/类型/……（如电商数据集）


        #积累/算法模型/YOLO #积累/算法模型/LLM #积累/算法模型/……（注意摘要和题目中的模型关键词，如YOLO、BERT等）


        #积累/实验方案/…… #积累/工具/…… （如果摘要中特别强调了使用了什么方法方案，对后续展开类似研究有益的可以添加）


        #主题/供应链管理 #主题/能源 #主题/新闻推荐  （可以是任何主题，尤其是综述类的，要特别关注主题是什么）



        特别说明：


        范式分类：如果摘要或标题提到“提出…概念/机制/框架/理论”，则分类为
        #范式/理论；涉及“通过数据分析/回归/问卷/统计/案例”的方法，应分类为 #范式/实证；包含“模型/仿真/算法/优化/预测”的论文应分类为
        #范式/模型构建；文献综述或系统性回顾应分类为 #范式/综述；方法论或工具开发的论文应分类为 #范式/方法论。


        拓展标签：除了“范式”部分，可以根据论文中涉及的关键词或术语，自动扩展标签。例如，如果论文涉及深度学习、神经网络、强化学习等领域，可以自动添加“#积累/算法模型/”相关标签（如
        RNN、BERT、YOLO 等）。如果论文关注特定领域，如供应链、能源等，也可以扩展为“#主题/供应链管理”或“#主题/能源”。


        算法模型和工具标签：如果文中提到经典算法模型（如RNN、LSTM、YOLO、BERT等）或常用工具（如Python、R），则应自动添加“积累/算法模型/”或“积累/工具/”标签。


        主题标签拓展：根据文献的核心内容，系统地自动扩展为相关领域的标签，如供应链管理、能源、信息系统等。



        输出要求：

        - 必须返回一个JSON对象

        - JSON键包括："tags"（字符串数组）和"reasoning"（简短说明）


        文献信息：

        标题：${title}

        期刊：${publicationTitle}

        日期：${date}

        摘要：${abstractNote}

        `;

            // === 请求体 ===
            const payload = {
                model: modelName,
                messages: [
                    { role: "system", content: "You are an expert in classifying management science papers." },
                    { role: "user", content: prompt }
                ],
                temperature: aiTemperature,
                max_tokens: aiMaxTokens,
                response_format: { type: "json_object" } // ✅ 确保输出是JSON
            };

            const response = await fetch(apiUrl, {
                method: "POST",
                headers: {
                    Authorization: `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error(`API Error: ${response.status} ${response.statusText}`);
            const data = await response.json();

            // ✅ 因为response_format是json_object，返回结果就是合法JSON字符串
            const text = data.choices?.[0]?.message?.content || "{}";
            const parsed = JSON.parse(text);

            const tags = parsed.tags || [];
            const reasoning = parsed.reasoning || "无详细说明";

            let appliedCount = 0;
            for (const tag of tags) {
                targetItem.addTag(tag);
                appliedCount++;
                // 将标签显示限制在合理宽度
                const tagDisplay = tag.length > 50 ? tag.substring(0, 47) + "..." : tag;
                itemProgress.setText(`• ${tagDisplay}`);
            }

            if (appliedCount > 0) {
                await targetItem.saveTx();
                itemProgress.setText(`✅ 已添加 ${appliedCount} 个标签`);
            } else {
                itemProgress.setText("⚠️ 未生成有效标签");
            }

            // 将reasoning按60字符换行
            const maxLineLength = 60;
            let formattedReasoning = "";
            let currentLine = "";
            const words = reasoning.split("");
            
            for (let i = 0; i < words.length; i++) {
                currentLine += words[i];
                if (currentLine.length >= maxLineLength || i === words.length - 1) {
                    formattedReasoning += currentLine + "\n";
                    currentLine = "";
                }
            }
            
            // 分行显示reasoning
            const reasoningLines = formattedReasoning.trim().split("\n");
            progressWindow.addDescription("🧠 原因:");
            for (const line of reasoningLines) {
                if (line.trim()) {
                    progressWindow.addDescription("  " + line.trim());
                }
            }
            
            progressWindow.startCloseTimer(4000, true);

        } catch (err) {
            Zotero.alert(null, "AI标签生成错误", err.message);
        }
      shortcut: Ctrl,Alt,t
      enabled: false
      menu: 🏷️🤖LLM添加条目标签
      name: Tag_LLM
      showInMenu:
        item: true
        collection: false
        tools: false
        reader: false
        readerAnnotation: false
    1762416853269-WvvdkPIt:
      event: 0
      operation: 4
      data: |
        /**
         * 全屏窗口This script toggles Fullscreen mode for Zotero by hiding UI elements.
         * @author thalient-ai
         * @usage Assign to a hotkey
         * @link https://github.com/windingwind/zotero-actions-tags/discussions/
         * @see https://github.com/windingwind/zotero-actions-tags/discussions/
         */

        (function () {
            const Zotero = require('Zotero');
            let mainWindow = Zotero.getMainWindow();
            const document = mainWindow.document;
            let isFullscreen = document.documentElement.classList.contains("fullscreen");
            let debounceTimeout = null;

            try {
                function mainScript() {
                    // Set window chrome and tabs attributes
                    document.documentElement.setAttribute('drawintitlebar', true);
                    document.documentElement.setAttribute('tabsintitlebar', true);

                    // Adjust chrome margin based on the OS
                    if (Zotero.isMac) {
                        document.documentElement.setAttribute('chromemargin', '0,-1,-1,-1');
                    } else {
                        document.documentElement.setAttribute('chromemargin', '0,2,2,2');
                    }

                    // Add fullscreen styles if not already added
                    function addFullscreenStyles() {
                        if (!document.querySelector("#fullscreen-style")) {
                            const style = document.createElement("style");
                            style.id = "fullscreen-style";
                            style.textContent = `
                                .fullscreen {
                                    margin: 0;
                                    padding: 0;
                                    overflow: hidden;
                                }
                                .fullscreen #mainPane {
                                    width: 100vw;
                                    height: 100vh;
                                }
                                .fullscreen .zotero-toolbar, 
                                .fullscreen .zotero-tb-button,
                                .fullscreen #zotero-title-bar,
                                .fullscreen #main-menubar,
                                .fullscreen #titlebar,    
                                .fullscreen .topbar {
                                    display: none !important;
                                }
                            `;
                            document.documentElement.appendChild(style);
                        }
                    }

                    // Toggle fullscreen mode by showing or hiding elements
                    function toggleFullscreenMode() {
                        if (debounceTimeout) {
                            clearTimeout(debounceTimeout);
                        }

                        debounceTimeout = setTimeout(() => {
                            if (isFullscreen) {
                                // Exiting fullscreen
                                document.documentElement.classList.remove("fullscreen");
                                isFullscreen = false;
                            } else {
                                // Entering fullscreen
                                document.documentElement.classList.add("fullscreen");
                                isFullscreen = true;
                            }
                        }, 300);
                    }

                    // Add styles and toggle fullscreen mode
                    addFullscreenStyles();
                    toggleFullscreenMode();
                }

                // Execute the script
                mainScript();
                
            } catch (error) {
                // Handle errors silently
            }
        })();
      shortcut: Shift,Ctrl,m
      enabled: true
      menu: ''
      name: MaxWin
      showInMenu:
        item: false
        collection: false
        tools: false
        reader: false
        readerAnnotation: false
    1762423671178-WvvdkPIt:
      event: 0
      operation: 4
      data: |
        // 自动翻译标题
        // author windingwind, PhoenixHwang, northword
        // link https://github.com/windingwind/zotero-tag/discussions/107
        // usage Event=Create Item

        const Zotero = require("Zotero");

        // 检查插件是否可用
        if (!Zotero.PDFTranslate) {
            return "[Action:Translate Title] Translate for Zotero is not installed or disabled.";
        }

        // 验证 item 对象
        if (!item || !item.getField || typeof item.getField !== 'function') {
            return "[Action:Translate Title] Target item is invalid or empty";
        }

        // 处理标题翻译
        let titleResult = "";

        try {
            const title = item.getField("title");
            if (!title) {
                throw new Error("Title is empty");
            }

            // 检查语言是否为中文
            const language = item.getField("language");
            if (language && language.toLowerCase().includes("zh")) {
                return "[Action:Translate Title] Title is in Chinese, skipping translation.";
            }

            // 使用翻译API翻译标题
            titleResult = (await Zotero.PDFTranslate.api.translate(title)).result;

            // 保存翻译结果到额外字段
            await Zotero.PDFTranslate.data.ztoolkit.ExtraField.setExtraField(item, "titleTranslation", titleResult);

            return `[Action:Translate Title] Successfully translated title "${title}" to "${titleResult}"`;

        } catch (error) {
            return `[Action:Translate Title] Translation failed: ${error.message}`;
        }
      shortcut: ''
      enabled: false
      menu: ''
      name: TransTitleAuto
      showInMenu:
        item: false
        collection: false
        tools: false
        reader: false
        readerAnnotation: false
    1762441394034-WvvdkPIt:
      event: 0
      operation: 4
      data: >
        /**
         * 脚本功能：将选中条目的PDF附件全文提取并复制到独立笔记中
         * 
         * 使用说明：
         * 1. 选中一个或多个包含PDF附件的条目
         * 2. 运行此脚本
         * 3. 脚本会提取所有PDF的全文，并创建一个独立笔记（或为每个条目创建子笔记）
         * 4. 笔记将保存在当前分类中
         */

        if (item) return; // 仅对所有选中项执行一次


        const Zotero = require("Zotero");

        const window = require("window");

        const console = require("console");


        // 使用传入的 items 或 item 变量

        let selectedItems = [];

        if (typeof items !== "undefined" && items.length > 0) {
          selectedItems = items;
        } else if (typeof item !== "undefined") {
          selectedItems = [item];
        } else {
          window.alert("请先选择要处理的文献");
          return;
        }


        // 询问用户创建方式

        let createMode = window.prompt(
          "请选择笔记创建方式：\n\n1. 合并到一个独立笔记（所有PDF合并）\n2. 为每个条目创建子笔记\n\n请输入 1 或 2："
        );


        if (!createMode || (createMode !== '1' && createMode !== '2')) {
          window.alert("未选择有效选项，操作终止");
          return;
        }


        // 创建进度窗口

        let progressWindow = new Zotero.ProgressWindow({ closeOnClick: false });

        progressWindow.changeHeadline("提取PDF全文到笔记");

        progressWindow.show();


        let progressIcon = 'chrome://zotero/skin/spinner-16px.png';

        let itemProgress = new progressWindow.ItemProgress(progressIcon,
        "PDF全文提取");

        itemProgress.setProgress(0);

        itemProgress.setText("⏳ 正在准备提取PDF全文...");

        progressWindow.show();


        /**
         * 提取单个PDF附件的全文
         */
        async function extractPDFText(attachment) {
          try {
            // 使用Zotero的PDFWorker提取全文
            let result = await Zotero.PDFWorker.getFullText(attachment.id, null, true);
            let text = result && result.text ? result.text : '';
            return text.trim();
          } catch (error) {
            console.error(`提取PDF全文失败: ${attachment.id}`, error);
            return null;
          }
        }


        /**
         * 模式1: 合并所有PDF全文到一个独立笔记
         */
        async function createMergedNote(items) {
          itemProgress.setProgress(10);
          itemProgress.setText("⏳ 正在提取PDF全文...");
          
          let parts = [];
          let processedCount = 0;
          let totalPDFs = 0;
          
          // 先统计总共有多少个PDF
          for (let item of items) {
            if (item.isAttachment()) continue;
            let attachments = Zotero.Items.get(item.getAttachments()).filter(a => a.isPDFAttachment());
            totalPDFs += attachments.length;
          }
          
          if (totalPDFs === 0) {
            itemProgress.setError();
            itemProgress.setText("❌ 未找到任何PDF附件");
            progressWindow.startCloseTimer(3000);
            return;
          }
          
          itemProgress.setText(`⏳ 找到 ${totalPDFs} 个PDF，开始提取...`);
          
          for (let item of items) {
            // 跳过附件类型的项目
            if (item.isAttachment()) {
              console.log(`跳过附件项目: ${item.id}`);
              continue;
            }
            
            let itemTitle = item.getField("title") || "无标题";
            let attachments = Zotero.Items.get(item.getAttachments()).filter(a => a.isPDFAttachment());
            
            for (let att of attachments) {
              processedCount++;
              let progress = 10 + Math.floor((processedCount / totalPDFs) * 70);
              itemProgress.setProgress(progress);
              
              let fileName = att.attachmentFilename || att.getField('title') || `PDF-${att.id}`;
              itemProgress.setText(`⏳ 提取中 (${processedCount}/${totalPDFs}): ${fileName.substring(0, 30)}...`);
              
              let text = await extractPDFText(att);
              
              if (text) {
                // 添加条目标题作为分隔
                parts.push(`<h2>${Zotero.Utilities.text2html(itemTitle)}</h2>`);
                parts.push(`<h3>📄 ${Zotero.Utilities.text2html(fileName)}</h3>`);
                parts.push(`<pre style="white-space: pre-wrap; font-family: monospace; font-size: 12px;">${Zotero.Utilities.text2html(text)}</pre>`);
                parts.push(`<hr/>`);
              } else {
                parts.push(`<p><em>⚠️ 无法提取: ${Zotero.Utilities.text2html(fileName)}</em></p>`);
              }
            }
          }
          
          if (parts.length === 0) {
            itemProgress.setError();
            itemProgress.setText("❌ 未能提取任何PDF内容");
            progressWindow.startCloseTimer(3000);
            return;
          }
          
          itemProgress.setProgress(85);
          itemProgress.setText("⏳ 正在创建笔记...");
          
          // 创建独立笔记
          let libraryID = items[0].libraryID;
          let library = Zotero.Libraries.get(libraryID);
          
          if (!library.editable) {
            itemProgress.setError();
            itemProgress.setText("❌ 该库为只读状态，无法创建笔记");
            progressWindow.startCloseTimer(3000);
            return;
          }
          
          // 获取当前分类
          let collectionID = null;
          try {
            let zoteroPane = Zotero.getActiveZoteroPane();
            if (zoteroPane) {
              let selectedCollection = zoteroPane.getSelectedCollection(true);
              if (selectedCollection) {
                collectionID = selectedCollection;
              }
            }
          } catch (e) {
            console.log("无法获取当前分类:", e);
          }
          
          let combinedHTML = `<h1>📚 PDF全文合集</h1>\n<p><em>提取时间: ${new Date().toLocaleString('zh-CN')}</em></p>\n<hr/>\n` + parts.join('\n');
          
          let note = new Zotero.Item('note');
          note.libraryID = libraryID;
          note.parentID = null; // 独立笔记
          if (collectionID) {
            note.addToCollection(collectionID);
          }
          
          note.setNote(combinedHTML);
          await note.saveTx();
          
          itemProgress.setProgress(100);
          itemProgress.setText(`✅ 成功创建笔记，已提取 ${processedCount} 个PDF`);
          progressWindow.startCloseTimer(3000);
        }


        /**
         * 模式2: 为每个条目创建子笔记
         */
        async function createChildNotes(items) {
          itemProgress.setProgress(10);
          itemProgress.setText("⏳ 正在为每个条目创建子笔记...");
          
          let processedCount = 0;
          let successCount = 0;
          let totalItems = items.filter(item => !item.isAttachment()).length;
          
          if (totalItems === 0) {
            itemProgress.setError();
            itemProgress.setText("❌ 未找到有效的条目");
            progressWindow.startCloseTimer(3000);
            return;
          }
          
          for (let item of items) {
            // 跳过附件类型的项目
            if (item.isAttachment()) {
              console.log(`跳过附件项目: ${item.id}`);
              continue;
            }
            
            processedCount++;
            let progress = 10 + Math.floor((processedCount / totalItems) * 80);
            itemProgress.setProgress(progress);
            
            let itemTitle = item.getField("title") || "无标题";
            itemProgress.setText(`⏳ 处理中 (${processedCount}/${totalItems}): ${itemTitle.substring(0, 30)}...`);
            
            // 获取PDF附件
            let attachments = Zotero.Items.get(item.getAttachments()).filter(a => a.isPDFAttachment());
            
            if (attachments.length === 0) {
              console.log(`条目无PDF附件: ${itemTitle}`);
              continue;
            }
            
            // 合并该条目所有PDF的全文
            let parts = [];
            for (let att of attachments) {
              let fileName = att.attachmentFilename || att.getField('title') || `PDF-${att.id}`;
              let text = await extractPDFText(att);
              
              if (text) {
                parts.push(`<h3>📄 ${Zotero.Utilities.text2html(fileName)}</h3>`);
                parts.push(`<pre style="white-space: pre-wrap; font-family: monospace; font-size: 12px;">${Zotero.Utilities.text2html(text)}</pre>`);
                if (attachments.length > 1) parts.push(`<hr/>`);
              }
            }
            
            if (parts.length === 0) {
              console.log(`条目PDF提取失败: ${itemTitle}`);
              continue;
            }
            
            // 创建子笔记
            try {
              let noteHTML = `<h2>${Zotero.Utilities.text2html(itemTitle)}</h2>\n<p><em>提取时间: ${new Date().toLocaleString('zh-CN')}</em></p>\n<hr/>\n` + parts.join('\n');
              
              let note = new Zotero.Item('note');
              note.libraryID = item.libraryID;
              note.parentID = item.id; // 设置为子笔记
              note.setNote(noteHTML);
              await note.saveTx();
              
              successCount++;
            } catch (error) {
              console.error(`创建子笔记失败: ${itemTitle}`, error);
            }
          }
          
          itemProgress.setProgress(100);
          itemProgress.setText(`✅ 成功为 ${successCount} 个条目创建子笔记`);
          progressWindow.startCloseTimer(3000);
        }


        // 根据用户选择执行相应模式

        if (createMode === '1') {
          createMergedNote(selectedItems).catch((error) => {
            console.error("创建合并笔记时出错:", error);
            itemProgress.setError();
            itemProgress.setText(`❌ 错误: ${error.message}`);
            progressWindow.startCloseTimer(5000);
          });
        } else if (createMode === '2') {
          createChildNotes(selectedItems).catch((error) => {
            console.error("创建子笔记时出错:", error);
            itemProgress.setError();
            itemProgress.setText(`❌ 错误: ${error.message}`);
            progressWindow.startCloseTimer(5000);
          });
        }
      shortcut: ''
